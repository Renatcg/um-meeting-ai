services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: um-meeting-ai-postgres
    environment:
      POSTGRES_DB: um_meeting_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d um_meeting_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
